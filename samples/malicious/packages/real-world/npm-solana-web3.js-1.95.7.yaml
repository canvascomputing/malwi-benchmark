description: >
  Injects an addToQueue function into the Solana Web3.js library that captures private
  keys used for transaction signing. Exfiltrates keys to an attacker-controlled domain
  (sol-rpc.xyz) disguised as legitimate CloudFlare headers. Published via a compromised
  maintainer npm account.
