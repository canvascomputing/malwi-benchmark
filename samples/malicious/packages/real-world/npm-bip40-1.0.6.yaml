description: >
  Contains the core NodeCordRAT payload. Used as a dependency by bitcoin-main-lib and
  bitcoin-lib-js. Implements Discord-based C2 communication with a hardcoded bot token.
  Steals Chrome credentials, MetaMask seed phrases, and API secrets. Exfiltrates data
  as attachments to a private Discord channel.
