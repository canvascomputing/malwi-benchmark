description: >
  Typosquat of termcolor. Contains a function that decodes a hex-encoded curl command
  to download a RAT client (helper.py) from Pastebin. The SilentSync RAT supports
  remote shell execution, file exfiltration, screenshot capture, and browser credential
  theft across Windows, Linux, and macOS with platform-specific persistence.
